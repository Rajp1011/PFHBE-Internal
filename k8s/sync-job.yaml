apiVersion: batch/v1
kind: Job
metadata:
  name: ge-config-sync
  namespace: ge-dev
spec:
  template:
    spec:
      containers:
      - name: git-sync
        image: alpine/git:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e

          # 1. Install dependencies
          apk add --no-cache git rsync openssh-client

          # 2. Setup SSH key for Private Repo access
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # 3. Define Paths - Clearly Separated
          REPO_URL="git@github.com:Rajp1011/PFHBE-Internal.git"
          REPO_CACHE_BASE="/mnt/pvc/.repo-cache"
          REPO_DIR="$REPO_CACHE_BASE/PFHBE-Internal"
          SRC_DIR="$REPO_DIR/Internal"
          
          # Deployment Paths
          RELEASES_DIR="/mnt/pvc/releases"
          RELEASE_ID=$(date -u "+%Y%m%d_%H%M%S")
          NEW_RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
          CURRENT_LINK="/mnt/pvc/current"
          
          AUDIT_LOG="/mnt/pvc/sync_audit.log"

          # 4. Ensure base directories exist outside of repo-cache
          mkdir -p "$RELEASES_DIR"
          mkdir -p "$REPO_CACHE_BASE"

          # 5. Update Local Git Cache (The Loading Dock)
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Initial clone into repo-cache..."
            git clone --depth 1 "$REPO_URL" "$REPO_DIR"
          else
            echo "Updating existing repo-cache..."
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
          fi

          # 6. Atomic Sync Preparation
          # Check what the 'current' symlink points to right now
          # We use this as the --link-dest template for the NEXT release
          PREVIOUS_RELEASE_PATH=$(readlink -f "$CURRENT_LINK" || echo "")
          mkdir -p "$NEW_RELEASE_DIR"

          echo "Starting Atomic Sync to new release folder: $RELEASE_ID"
          
          if [ -n "$PREVIOUS_RELEASE_PATH" ] && [ -d "$PREVIOUS_RELEASE_PATH" ]; then
            echo "Using $PREVIOUS_RELEASE_PATH as hard-link template..."
            # Hard-link unchanged files from the PREVIOUS release to the NEW release
            rsync -rtvi --delete --link-dest="$PREVIOUS_RELEASE_PATH" "$SRC_DIR/" "$NEW_RELEASE_DIR/" > /tmp/changes.txt
          else
            echo "No previous release found. Performing full initial sync..."
            rsync -rtvi "$SRC_DIR/" "$NEW_RELEASE_DIR/" > /tmp/changes.txt
          fi

          # 7. Update Audit Log
          echo "-------------------------------------------" >> "$AUDIT_LOG"
          echo "SYNC START: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$AUDIT_LOG"
          echo "RELEASE ID: $RELEASE_ID" >> "$AUDIT_LOG"
          
          if [ -s /tmp/changes.txt ]; then
             # Filter out folder entries and only log actual file changes
             grep -E '^>f' /tmp/changes.txt | sed \
              -e 's/^>f+++++++++ /[ ADDED   ] /' \
              -e 's/^>f.* /[ UPDATED ] /' >> "$AUDIT_LOG"
          else
             echo "No files changed. Release created via hard-links." >> "$AUDIT_LOG"
          fi

          # 8. THE ATOMIC SWITCH
          # Switch the symlink to point to the new versioned folder
          ln -sfn "$NEW_RELEASE_DIR" "$CURRENT_LINK"
          echo "Atomic switch complete: $CURRENT_LINK -> $NEW_RELEASE_DIR"

          # 9. Cleanup: Keep the 3 most recent releases
          cd "$RELEASES_DIR"
          # List folders by time, skip the first 3, delete the rest
          ls -1dt 202* | tail -n +4 | xargs rm -rf || true

          echo "===== SYNC AUDIT SUMMARY ====="
          tail -n 50 "$AUDIT_LOG"
          echo "Sync Job Finished Successfully!"

        env:
        - name: SSH_KEY
          valueFrom:
            secretKeyRef:
              name: internal-raj-deploy-key
              key: ssh-privatekey
        volumeMounts:
        - name: storage
          mountPath: /mnt/pvc
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: ge-pvc
      restartPolicy: Never
  backoffLimit: 2