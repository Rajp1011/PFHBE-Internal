name: Sync PVC and Restart Services

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
    paths:
      - 'GE/**' 

jobs:
  sync-pvc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: iGaming
          cluster-name: ig-dev

      - name: Run Sync Job
        run: |
          kubectl delete job ge-config-sync -n ge-dev --ignore-not-found=true
          kubectl apply -f k8s/sync-job.yaml

      - name: Wait for Sync Completion
        run: |
          echo "Monitoring Sync Job for GE structure..."
          for i in {1..60}; do
            if kubectl wait --for=condition=complete job/ge-config-sync -n ge-dev --timeout=10s; then
              echo "SUCCESS: GE folder sync completed."
              exit 0
            fi

            FAILED=$(kubectl get job ge-config-sync -n ge-dev -o jsonpath='{.status.failed}')
            if [ "${FAILED:-0}" != "0" ]; then
              echo "CRITICAL ERROR: Sync Job failed."
              kubectl logs job/ge-config-sync -n ge-dev || true
              exit 1
            fi

            sleep 0
          done

          echo "TIMEOUT: Sync job did not complete in expected time."
          kubectl logs job/ge-config-sync -n ge-dev || true
          exit 1

      - name: Collect Sync Logs
        if: always()
        run: |
          mkdir -p artifacts
          kubectl logs job/ge-config-sync -n ge-dev > artifacts/ge-config-sync.log 2>&1 || true

      - name: Upload Sync Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ge-config-sync-logs
          path: artifacts/

  restart-services:
    needs: sync-pvc
    runs-on: ubuntu-latest
    environment:
      name: ge-restart-approval

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: iGaming
          cluster-name: ig-dev

      - name: Resolve Path and Update ConfigMap
        run: |
          echo "Resolving the new path created by the Sync Job..."
          
          # This command checks where 'current' points on the PVC right now
          REAL_PATH=$(kubectl run get-path --image=alpine --rm -i --restart=Never -n ge-dev --overrides='
          {
            "spec": {
              "containers": [{
                "name": "c", "image": "alpine", 
                "command": ["sh", "-c", "readlink -f /mnt/pvc/current | sed \"s|/mnt/pvc/||\""],
                "volumeMounts": [{"name": "v", "mountPath": "/mnt/pvc"}]
              }],
              "volumes": [{"name": "v", "persistentVolumeClaim": {"claimName": "ge-pvc"}}]
            }
          }' | tr -d '\r' | grep "releases/GE-")

          if [ -z "$REAL_PATH" ]; then
            echo "ERROR: Could not resolve the new release path!"
            exit 1
          fi

          echo "SUCCESS: Found Real Path: $REAL_PATH"
          echo "Updating ConfigMap 'ge-config-version'..."

          # Update the ConfigMap so Pods know where to look
          kubectl create configmap ge-config-version \
            --from-literal=path="$REAL_PATH" \
            -n ge-dev -o yaml --dry-run=client | kubectl apply -f -

      # --- RESTART STEP (Now the pods will see the updated ConfigMap) ---
      - name: Restart Game Engine
        run: |
          echo "Approval received. Restarting all GE components..."
          kubectl rollout restart deployment -l app=ge-service -n ge-dev
          kubectl rollout restart deployment ge-web-deployment -n ge-dev