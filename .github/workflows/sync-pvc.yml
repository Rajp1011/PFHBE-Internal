name: Sync PVC and Restart Services

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
    paths:
      - 'Internal/**' # Trigger only if files in the Internal directory are changed

jobs:
  sync-pvc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: iGaming
          cluster-name: ig-dev

      - name: Run Sync Job
        run: |
          kubectl delete job ge-config-sync -n ge-dev --ignore-not-found=true
          kubectl apply -f k8s/sync-job.yaml

      - name: Wait for Sync Completion
        run: |
          echo "Monitoring Sync Job..."
          for i in {1..60}; do
            if kubectl wait --for=condition=complete job/ge-config-sync -n ge-dev --timeout=10s; then
              echo "SUCCESS: PVC sync job completed."
              exit 0
            fi

            FAILED=$(kubectl get job ge-config-sync -n ge-dev -o jsonpath='{.status.failed}')
            if [ "${FAILED:-0}" != "0" ]; then
              echo "CRITICAL ERROR: Sync Job failed."
              kubectl logs job/ge-config-sync -n ge-dev || true
              exit 1
            fi

            sleep 0
          done

          echo "TIMEOUT: Sync job did not complete in expected time."
          kubectl logs job/ge-config-sync -n ge-dev || true
          exit 1

      - name: Collect Sync Logs
        if: always()
        run: |
          mkdir -p artifacts
          kubectl logs job/ge-config-sync -n ge-dev > artifacts/ge-config-sync.log 2>&1 || true

      - name: Upload Sync Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ge-config-sync-logs
          path: artifacts/

  restart-services:
    needs: sync-pvc
    runs-on: ubuntu-latest
    environment:
      name: ge-restart-approval

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: iGaming
          cluster-name: ig-dev

      - name: Restart Game Engine
        run: |
          echo "Manual approval received. Restarting deployments..."
          kubectl rollout restart deployment ge-service-1 -n ge-dev
          kubectl rollout restart deployment ge-service-2 -n ge-dev
          kubectl rollout restart deployment ge-service-3 -n ge-dev
          kubectl rollout restart deployment ge-service-4 -n ge-dev
          kubectl rollout restart deployment ge-service-5 -n ge-dev
          kubectl rollout restart deployment ge-web-deployment -n ge-dev

      - name: Check Rollout Status
        run: |
          kubectl rollout status deployment/ge-service-1 -n ge-dev --timeout=300s
          kubectl rollout status deployment/ge-web-deployment -n ge-dev --timeout=300s